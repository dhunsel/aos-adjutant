name: aos-adjutant
services:
  webapp:
    image: ghcr.io/dhunsel/aos-adjutant/webapp:${WEBAPP_VERSION}
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT: Production
      - Authentication__ClientId: ${CLIENT_ID}
      - Authentication__ClientSecret: ${CLIENT_SECRET}
      - Authentication__Authority: ${AUTH_URL}
      - DbContextConnectionString: ${DB_CONNECTION_STRING}
      - AllowedHosts: ${HOSTNAME}
    logging:
      driver: local
    depends_on:
      postgres:
        condition: service_healthy
      pocket-id:
        condition: service_healthy
    networks:
      - private
      - proxy

  postgres:
    image: postgres:18.1
    restart: unless-stopped
    environment:
      - POSTGRES_DB: aos_adjutant
      - POSTGRES_USER: postgres
      - POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      - MIGRATOR_PASSWORD: ${MIGRATOR_PASSWORD}
      - APP_PASSWORD: ${APP_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    logging:
      driver: local
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres", "-d", "aos_adjutant" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 5s
    shm_size: 256mb
    networks:
      - private

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2.7
    restart: unless-stopped
    environment:
      - APP_URL: ${AUTH_URL}
      - ENCRYPTION_KEY: ${AUTH_ENCRYPTION_KEY}
      - TRUST_PROXY: ${AUTH_TRUST_PROXY}
    healthcheck:
      test: [ "CMD", "/app/pocket-id", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 5s
    volumes:
      - pocket-id-data:/app/data
    logging:
      driver: local
    networks:
      - proxy

  grafana:
    image: grafana/grafana:13.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning/:/etc/grafana/provisioning:ro
    logging:
      driver: local
    networks:
      - private
      - proxy

  otel-collector:
    image: otel/opentelemetry-collector:0.152.1
    restart: unless-stopped
    environment:
      DEPLOYMENT_ENV: production
    volumes:
      - ./infra/observability/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    logging:
      driver: local
    networks:
      - private

  loki:
    image: grafana/loki:3.7
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./infra/observability/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    logging:
      driver: local
    networks:
      - private

  prometheus:
    image: prom/prometheus:v3.11.3
    restart: unless-stopped
    command:
      - --web.enable-otlp-receiver
      - --enable-feature=exemplar-storage
      - --config.file=/etc/prometheus/config.yaml
    volumes:
      - ./infra/observability/prometheus/config.yaml:/etc/prometheus/config.yaml:ro
      - prometheus-data:/prometheus
    logging:
      driver: local
    networks:
      - private

  tempo:
    image: grafana/tempo:2.10.5
    restart: unless-stopped
    command: -config.file=/etc/config.yaml
    volumes:
      - ./infra/observability/tempo/config.yaml:/etc/config.yaml:ro
      - tempo-data:/var/tempo
    logging:
      driver: local
    networks:
      - private

volumes:
  postgres-data:
  loki-data:
  prometheus-data:
  grafana-data:
  tempo-data:
  pocket-id-data:

networks:
  private:
    internal: true
  proxy:

