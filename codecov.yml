coverage:
  status:
    project:
      default:
        # Fail if overall project coverage drops by more than 5% compared to parent commit
        target: auto
        threshold: 5%
    patch:
      default:
        # New code introduced in a PR should be at least 60% covered
        target: 60%

flags:
  backend:
    paths:
      - backend/

ignore:
  - "backend/src/AosAdjutant.Api/Migrations/**"

comment:
  layout: "condensed_header,condensed_files,condensed_footer"
  hide_project_coverage: true
  behavior: default
